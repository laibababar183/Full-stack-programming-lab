<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 2 — Animated Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Task2.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="lab-tag">Lab Task 02</span>
      <h1>Image Gallery</h1>
      <p class="subtitle">Fade transitions with dynamic captions</p>
    </header>

    <div class="gallery-wrapper">
      <!-- Images -->
      <div class="gallery-frame">
        <img src="https://picsum.photos/seed/alpine/700/420"   class="gallery-img active" data-caption="Alpine Mountains — Nature at its finest">
        <img src="https://picsum.photos/seed/ocean99/700/420"  class="gallery-img"        data-caption="Ocean Waves — The call of the sea">
        <img src="https://picsum.photos/seed/forest7/700/420"  class="gallery-img"        data-caption="Dense Forest — Where silence speaks">
        <img src="https://picsum.photos/seed/desert3/700/420"  class="gallery-img"        data-caption="Golden Desert — Endless horizons">
        <img src="https://picsum.photos/seed/city88/700/420"   class="gallery-img"        data-caption="City Lights — Urban energy at night">

        <!-- Prev / Next arrows -->
        <button class="arrow" id="prevBtn">&#8592;</button>
        <button class="arrow" id="nextBtn">&#8594;</button>

        <!-- Counter badge -->
        <div class="img-counter" id="imgCounter">1 / 5</div>
      </div>

      <!-- Caption -->
      <div class="caption-bar">
        <p id="caption">Alpine Mountains — Nature at its finest</p>
      </div>

      <!-- Dot indicators -->
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="Task2.js"></script>
</body>
</html>
