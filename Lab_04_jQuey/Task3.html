<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3 — Form Validation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Task3.css">
</head>
<body>
  <div class="container">
    <header>
      <span class="lab-tag">Lab Task 03</span>
      <h1>Registration Form</h1>
      <p class="subtitle">Fill all fields correctly to submit</p>
    </header>

    <form id="myForm" novalidate>

      <div class="field-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Ali Hassan" autocomplete="off">
        <span class="error-msg" id="nameErr">Name cannot be empty</span>
      </div>

      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g. ali@gmail.com" autocomplete="off">
        <span class="error-msg" id="emailErr">Enter a valid email address</span>
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters">
        <span class="error-msg" id="passErr">Password must be at least 6 characters</span>
      </div>

      <div class="field-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. 03001234567" autocomplete="off">
        <span class="error-msg" id="phoneErr">Enter a valid 11-digit phone number</span>
      </div>

      <button type="submit" id="submitBtn">Submit Form</button>

    </form>

    <!-- Success Message — pehle hidden rahega -->
    <div class="success-box" id="successBox">
      <div class="success-icon">✓</div>
      <h2>Form Submitted!</h2>
      <p>Your registration was successful. No page refresh needed!</p>
      <button id="resetBtn">Submit Another</button>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="Task3.js"></script>
</body>
</html>
